# LSTM pipeline config

data:
  ticker: AAPL
  start_date:
  end_date:
  download: true
  use_vix: true
  use_spy: false

features:
  use_exog: true
  use_exogenous: true
  use_regime_features: true

sequence:
  length: 60

prediction_horizon: 1
run_horizons: [1, 3]

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  train_end_date:
  val_end_date:

model:
  hidden_size: 64
  num_layers: 1
  dropout: 0.1
  loss: mse
  lr: 0.001
  weight_decay: 0.0
  batch_size: 64
  epochs: 50
  patience: 8
  grad_clip: 1.0
  seed: 42
  device: auto
  verbose: true

strategy:
  mode: sign
  threshold: 0.0
  fee_bps: 0.0
  slippage_bps: 0.0

outputs:
  root: results_lstm
  run_name: aapl_lstm

feature_importance:
  enabled: true
  method: permutation   # permutation | ablation | both
  metric: ic            # ic | mse | sharpe
  n_repeats: 5
  block_size:
  batch_size: 256
  top_n: 20
  horizon: 1

rolling_sharpe_window: 63

plots:
  price_plots_enabled: true
  returns_plots_enabled: true
  residuals_plots_enabled: true
  acf_max_lag: 20
  deciles_enabled: true
  deciles_n: 10
  smoothing_window: 5
  summary_split: test

metrics:
  mape_epsilon: 1e-6
